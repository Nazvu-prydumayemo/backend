name: Build & Deploy (Manual Approval)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy app

      - name: Run tests
        run: pytest

      - name: Build Docker image
        run: |
          docker build -t np-backend:latest .

  approval:
    name: Approval Gate
    runs-on: ubuntu-latest
    needs: build-and-test
    environment:
      name: production
      url: https://your-domain.com
    steps:
      - name: Waiting for approval
        run: echo "Deployment pending approval..."

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: approval
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            cd ${{ secrets.BACKEND_PATH }}
            bash deploy.sh

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deployment to VPS successful!"
          echo "Backend is running at http://${{ secrets.VPS_HOST }}"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          exit 1
