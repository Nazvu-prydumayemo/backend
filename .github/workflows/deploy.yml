name: Build & Deploy (Manual Approval)

on:
    workflow_dispatch:
      inputs:
        version:
          description: "Release version (e.g. v1.2.0)"
          required: true
          default: "v0.0.1"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build Docker image
        run: |
          docker build -t np-backend:latest .

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Production
      url: https://0pcode.tech

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            cd ${{ secrets.BACKEND_PATH }}
            bash deploy.sh

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deployment to VPS successful!"
          echo "Backend is running at http://${{ secrets.VPS_HOST }}"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          exit 1
